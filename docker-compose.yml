services:
  email-proxy:
    build: .
    container_name: email-proxy
    volumes:
      - ./data:/app/data
      - ./config.json:/app/config.json:ro
      - ./sensitive_patterns.json:/app/sensitive_patterns.json:ro
    env_file:
      - .env
    depends_on:
      - signal-api
    restart: unless-stopped
    networks:
      - default
      - ads-b_default

  signal-api:
    image: bbernhard/signal-cli-rest-api:latest
    container_name: signal-api
    volumes:
      - ./signal-data:/home/.local/share/signal-cli
    environment:
      - MODE=json-rpc
      # Port must match config.json "port". Append ?token=<secret> to authenticate.
      - RECEIVE_WEBHOOK_URL=http://email-proxy:${PROXY_PORT:-18795}/internal/signal-webhook
    restart: unless-stopped

networks:
  ads-b_default:
    external: true
